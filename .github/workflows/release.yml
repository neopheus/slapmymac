name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Run tests
        run: swift test

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Update Info.plist version
        env:
          VERSION: ${{ steps.version.outputs.version }}
          BUILD_NUMBER: ${{ github.run_number }}
        run: |
          plutil -replace CFBundleShortVersionString -string "$VERSION" \
            Sources/SlapMyMac/Resources/Info.plist
          plutil -replace CFBundleVersion -string "$BUILD_NUMBER" \
            Sources/SlapMyMac/Resources/Info.plist

      - name: Import signing certificate
        env:
          CERTIFICATE_P12: ${{ secrets.DEVELOPER_ID_CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 32)"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$CERTIFICATE_P12" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security import "$RUNNER_TEMP/certificate.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/productsign

          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain

      - name: Build and sign release
        env:
          DEVELOPER_ID: ${{ secrets.DEVELOPER_ID_NAME }}
        run: ./Scripts/build.sh --release

      - name: Create DMG
        run: ./Scripts/create-dmg.sh

      - name: Sign DMG
        env:
          DEVELOPER_ID: ${{ secrets.DEVELOPER_ID_NAME }}
        run: |
          codesign --force --sign "$DEVELOPER_ID" --timestamp .build/SlapMyMac.dmg

      - name: Notarize DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          TEAM_ID: ${{ secrets.TEAM_ID }}
          APP_PASSWORD: ${{ secrets.APP_SPECIFIC_PASSWORD }}
        run: |
          xcrun notarytool submit .build/SlapMyMac.dmg \
            --apple-id "$APPLE_ID" \
            --team-id "$TEAM_ID" \
            --password "$APP_PASSWORD" \
            --wait
          xcrun stapler staple .build/SlapMyMac.dmg

      - name: Create Sparkle ZIP
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          cd .build
          ditto -c -k --sequesterRsrc --keepParent SlapMyMac.app "SlapMyMac-${VERSION}.zip"

      - name: Generate checksums
        id: sha
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          SHA_DMG=$(shasum -a 256 .build/SlapMyMac.dmg | awk '{print $1}')
          SHA_ZIP=$(shasum -a 256 ".build/SlapMyMac-${VERSION}.zip" | awk '{print $1}')
          ZIP_SIZE=$(stat -f%z ".build/SlapMyMac-${VERSION}.zip")
          echo "sha256_dmg=$SHA_DMG" >> "$GITHUB_OUTPUT"
          echo "sha256_zip=$SHA_ZIP" >> "$GITHUB_OUTPUT"
          echo "zip_size=$ZIP_SIZE" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
          SHA_DMG: ${{ steps.sha.outputs.sha256_dmg }}
          SHA_ZIP: ${{ steps.sha.outputs.sha256_zip }}
        run: |
          gh release create "v${VERSION}" \
            ".build/SlapMyMac.dmg" \
            ".build/SlapMyMac-${VERSION}.zip" \
            --title "v${VERSION}" \
            --generate-notes \
            --notes "$(cat <<EOF
          ## SlapMyMac ${VERSION}

          ### Installation

          **Option 1 — DMG (recommended)**
          Download SlapMyMac.dmg, open it and drag the app to Applications.
          Signed with Developer ID and notarized by Apple.

          **Option 2 — Homebrew**
          \`\`\`bash
          brew install neopheus/slapmymac/slapmymac
          \`\`\`

          ### Verification
          \`\`\`
          DMG SHA256: ${SHA_DMG}
          ZIP SHA256: ${SHA_ZIP}
          \`\`\`

          ### Requirements
          - macOS 14+ (Sonoma)
          - Apple Silicon (M1/M2/M3/M4)
          EOF
          )"

      - name: Update Sparkle appcast
        env:
          VERSION: ${{ steps.version.outputs.version }}
          BUILD_NUMBER: ${{ github.run_number }}
          ZIP_SIZE: ${{ steps.sha.outputs.zip_size }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PUBDATE=$(date -R)
          cat > /tmp/appcast.xml << XMLEOF
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle">
              <channel>
                  <title>SlapMyMac</title>
                  <link>https://github.com/neopheus/slapmymac/releases</link>
                  <item>
                      <title>Version ${VERSION}</title>
                      <sparkle:version>${BUILD_NUMBER}</sparkle:version>
                      <sparkle:shortVersionString>${VERSION}</sparkle:shortVersionString>
                      <sparkle:minimumSystemVersion>14.0</sparkle:minimumSystemVersion>
                      <pubDate>${PUBDATE}</pubDate>
                      <enclosure url="https://github.com/neopheus/slapmymac/releases/download/v${VERSION}/SlapMyMac-${VERSION}.zip"
                                 sparkle:version="${BUILD_NUMBER}"
                                 sparkle:shortVersionString="${VERSION}"
                                 length="${ZIP_SIZE}"
                                 type="application/octet-stream" />
                  </item>
              </channel>
          </rss>
          XMLEOF

          gh release delete-asset appcast appcast.xml --yes 2>/dev/null || true
          gh release upload appcast /tmp/appcast.xml 2>/dev/null || \
            gh release create appcast /tmp/appcast.xml --title "Sparkle Appcast Feed" --notes "Auto-update feed for Sparkle."
