name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Run tests
        run: swift test

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Update Info.plist version
        env:
          VERSION: ${{ steps.version.outputs.version }}
          BUILD_NUMBER: ${{ github.run_number }}
        run: |
          plutil -replace CFBundleShortVersionString -string "$VERSION" \
            Sources/SlapMyMac/Resources/Info.plist
          plutil -replace CFBundleVersion -string "$BUILD_NUMBER" \
            Sources/SlapMyMac/Resources/Info.plist

      - name: Import signing certificate
        env:
          CERTIFICATE_P12: ${{ secrets.DEVELOPER_ID_CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 32)"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$CERTIFICATE_P12" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security import "$RUNNER_TEMP/certificate.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/productsign

          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain

      - name: Build release
        run: ./Scripts/build.sh --release

      - name: Sign app
        env:
          DEVELOPER_ID: ${{ secrets.DEVELOPER_ID_NAME }}
        run: |
          codesign --force --deep --options runtime \
            --sign "$DEVELOPER_ID" \
            --timestamp \
            .build/SlapMyMac.app

      - name: Create DMG
        run: ./Scripts/create-dmg.sh

      - name: Sign DMG
        env:
          DEVELOPER_ID: ${{ secrets.DEVELOPER_ID_NAME }}
        run: |
          codesign --force --sign "$DEVELOPER_ID" \
            --timestamp \
            .build/SlapMyMac.dmg

      - name: Notarize DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          TEAM_ID: ${{ secrets.TEAM_ID }}
          APP_PASSWORD: ${{ secrets.APP_SPECIFIC_PASSWORD }}
        run: |
          xcrun notarytool submit .build/SlapMyMac.dmg \
            --apple-id "$APPLE_ID" \
            --team-id "$TEAM_ID" \
            --password "$APP_PASSWORD" \
            --wait

          xcrun stapler staple .build/SlapMyMac.dmg

      - name: Generate SHA256
        id: sha
        run: |
          SHA=$(shasum -a 256 .build/SlapMyMac.dmg | awk '{print $1}')
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: .build/SlapMyMac.dmg
          generate_release_notes: true
          body: |
            ## SlapMyMac ${{ steps.version.outputs.version }}

            ### Installation

            **Option 1 — DMG**
            Download `SlapMyMac.dmg`, open it and drag the app to Applications.

            **Option 2 — Homebrew**
            ```bash
            brew install neopheus/slapmymac/slapmymac
            ```

            ### Verification
            ```
            SHA256: ${{ steps.sha.outputs.sha256 }}
            ```

            ### Requirements
            - macOS 14+ (Sonoma)
            - Apple Silicon (M1/M2/M3/M4)
